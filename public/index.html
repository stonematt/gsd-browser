<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gsd-browser</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/markdown.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */

    #app-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 44px;
      flex-shrink: 0;
      z-index: 10;
    }

    #app-title {
      font-weight: 600;
      color: var(--text-bright);
      text-decoration: none;
      font-size: 14px;
      flex-shrink: 0;
    }

    #app-title:hover {
      color: var(--text-link);
    }

    #header-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid transparent;
      flex-shrink: 0;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: var(--border-default);
    }

    .nav-link.active {
      color: var(--text-bright);
      border-color: var(--border-default);
      background: var(--bg-page);
    }

    #header-sep {
      color: var(--border-default);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* Sidebar toggle — only shown in browse view */
    #sidebar-toggle {
      background: none;
      border: 1px solid var(--border-default);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      display: none;
    }

    #sidebar-toggle:hover {
      background: var(--border-default);
      color: var(--text-primary);
    }

    #sidebar-toggle.visible {
      display: block;
    }

    /* Breadcrumb — only shown in browse view */
    #breadcrumb {
      flex: 1;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: none;
    }

    #breadcrumb.visible {
      display: block;
    }

    #breadcrumb .bc-sep {
      margin: 0 4px;
      color: var(--text-dimmed);
    }

    #breadcrumb .bc-file {
      color: var(--text-bright);
    }

    /* Header spacer — used when breadcrumb is not shown */
    #header-spacer {
      flex: 1;
    }

    /* ------------------------------------------------------------------ */
    /* Views container                                                      */
    /* ------------------------------------------------------------------ */

    #views {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .view {
      display: none;
      width: 100%;
      height: 100%;
    }

    .view.active {
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Dashboard view                                                       */
    /* ------------------------------------------------------------------ */

    #view-dashboard {
      overflow-y: auto;
    }

    #view-dashboard.active {
      display: block;
    }

    .dash-section {
      padding: 24px 24px 0;
    }

    .dash-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .project-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .project-card:hover {
      border-color: var(--text-link);
    }

    .project-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .project-card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .project-card-milestone {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--border-default);
      border-radius: 4px;
      padding: 1px 8px;
      flex-shrink: 0;
    }

    /* Current phase callout */
    .card-current-phase {
      margin-bottom: 10px;
    }

    .card-phase-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--status-active);
      margin-bottom: 2px;
    }

    .card-phase-progress {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-phase-activity {
      font-size: 11px;
      color: var(--text-dimmed);
      margin-top: 2px;
    }

    /* Phase strip — recursive tree minimap */
    .card-history-strip {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      padding: 6px 0;
      align-items: flex-start;
      position: relative;
    }
    /* Timeline arrow: horizontal line with arrowhead at right end */
    .card-history-strip::before {
      content: '';
      position: absolute;
      left: 0;
      right: 6px;
      top: 4px;
      height: 0;
      border-top: 1px solid var(--border-default);
      opacity: 0.8;
      pointer-events: none;
      z-index: 0;
    }
    /* Arrowhead */
    .card-history-strip::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0px;
      width: 0;
      height: 0;
      border-top: 4.5px solid transparent;
      border-bottom: 4.5px solid transparent;
      border-left: 7px solid var(--border-default);
      opacity: 0.8;
      pointer-events: none;
      z-index: 0;
    }
    .card-history-strip > .history-node {
      z-index: 1;
      margin-top: 5px;
    }

    .history-rect {
      border-radius: 2px;
      cursor: default;
      transition: opacity 0.15s;
      flex-shrink: 1;
    }
    .history-rect:hover { opacity: 0.75; }
    .history-rect--complete { background: var(--status-complete); }
    .history-rect--active { background: var(--status-active); }
    .history-rect--active[data-area="large"] { box-shadow: 0 0 4px var(--active-glow); }
    .history-rect--active[data-area="small"] { border: 1.5px solid var(--status-active); box-shadow: none; }
    .history-rect--pending { background: var(--status-pending); }

    /* Tree node: column, left-aligned */
    .history-node {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex-shrink: 1;
      min-width: 0;
    }

    /* Children tier: own row, left-justified, indented from parent.
       Siblings flow horizontally. L-elbow connects up to parent. */
    .history-tier {
      display: flex;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: flex-start;
      position: relative;
      margin-top: 2px;
      padding-left: 10px;
    }
    /* L-elbow from first child up to parent */
    .history-tier::before {
      content: '';
      position: absolute;
      left: 0;
      top: -2px;
      bottom: 50%;
      width: 8px;
      border-left: 1.5px solid var(--border-default);
      border-bottom: 1.5px solid var(--border-default);
      border-bottom-left-radius: 3px;
    }

    /* Frontier list — active/future phases with full names and goals */
    .card-frontier {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 0;
      max-height: 200px;
      overflow-y: auto;
    }

    .frontier-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 12px;
      line-height: 1.4;
    }

    .frontier-item--depth-1 { padding-left: 12px; }
    .frontier-item--depth-2 { padding-left: 24px; }

    .frontier-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .frontier-dot--active { background: var(--status-active); box-shadow: 0 0 4px var(--active-glow); }
    .frontier-dot--pending { background: var(--status-pending); }
    .frontier-dot--complete { background: var(--status-complete); }

    .frontier-slug {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .frontier-goal {
      color: var(--text-dimmed);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .frontier-progress {
      color: var(--text-secondary);
      font-size: 11px;
      white-space: nowrap;
    }

    .quick-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border-default);
      padding-top: 10px;
      margin-top: 4px;
    }

    .quick-link {
      font-size: 11px;
      color: var(--text-link);
      text-decoration: none;
    }

    .quick-link:hover {
      text-decoration: underline;
    }

    .other-sources-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .other-source-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .other-source-link {
      color: var(--text-link);
      text-decoration: none;
      font-size: 13px;
    }

    .other-source-link:hover {
      text-decoration: underline;
    }

    .other-source-badge {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--border-default);
      border-radius: 4px;
      padding: 1px 6px;
    }

    .dash-empty {
      color: var(--text-dimmed);
      font-style: italic;
      padding: 24px 0;
    }

    .dash-error {
      color: var(--status-danger);
      padding: 24px;
    }

    .dash-loading {
      color: var(--text-muted);
      font-style: italic;
      padding: 24px;
    }

    .dash-section-gap { margin-top: 24px; }
    .dash-bottom-pad { height: 24px; }

    /* ------------------------------------------------------------------ */
    /* Browse view                                                          */
    /* ------------------------------------------------------------------ */

    #view-browse {
      display: none;
    }

    #view-browse.active {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 1fr;
      grid-template-areas: "sidebar content";
    }

    #view-browse.sidebar-hidden {
      grid-template-columns: 0 1fr;
    }

    #view-browse.sidebar-hidden #browse-sidebar {
      display: none;
    }

    /* ------------------------------------------------------------------ */
    /* Browse sidebar                                                       */
    /* ------------------------------------------------------------------ */

    #browse-sidebar {
      grid-area: sidebar;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-default);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #source-switcher {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
    }

    #source-select {
      width: 100%;
      background: var(--bg-page);
      border: 1px solid var(--border-default);
      color: var(--text-primary);
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    #source-select:focus {
      outline: none;
      border-color: var(--text-link);
    }

    #tree {
      flex: 1;
      padding: 8px 0;
      overflow-y: auto;
    }

    .tree-empty {
      color: var(--text-dimmed);
      font-style: italic;
      padding: 16px 12px;
      font-size: 13px;
    }

    .tree-node {
      display: block;
    }

    .tree-dir {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 0;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
    }

    .tree-dir:hover {
      color: var(--text-primary);
    }

    .tree-dir--convention {
      color: var(--text-primary);
      font-weight: 600;
    }

    .tree-dir--convention:hover {
      color: var(--text-bright);
    }

    .tree-dir-arrow {
      display: inline-block;
      width: 14px;
      font-size: 10px;
      transition: transform 0.1s;
      color: var(--text-dimmed);
      flex-shrink: 0;
    }

    .tree-dir.collapsed .tree-dir-arrow {
      transform: rotate(-90deg);
    }

    .tree-children[hidden] {
      display: none;
    }

    .tree-file {
      display: block;
      color: var(--text-link);
      text-decoration: none;
      padding: 3px 0;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-file:hover {
      text-decoration: underline;
    }

    .tree-file.active {
      background: var(--active-bg);
      border-left: 2px solid var(--text-link);
      color: var(--text-bright);
    }

    /* ------------------------------------------------------------------ */
    /* Browse content pane                                                  */
    /* ------------------------------------------------------------------ */

    #browse-content-wrapper {
      grid-area: content;
      background: var(--bg-page);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #browse-content {
      flex: 1;
      padding: 24px;
    }

    .content-loading {
      color: var(--text-muted);
      font-style: italic;
      padding: 24px 0;
    }

    .content-empty {
      color: var(--text-dimmed);
      font-style: italic;
      padding: 24px 0;
    }

    .content-error {
      color: var(--status-danger);
      padding: 24px 0;
    }

    #browse-content .markdown-body {
      max-width: 860px;
    }

    /* ------------------------------------------------------------------ */
    /* Project view                                                         */
    /* ------------------------------------------------------------------ */

    #view-project {
      overflow-y: auto;
    }

    #view-project.active {
      display: flex;
      flex-direction: column;
    }

    #project-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--border-default);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    #back-to-dashboard {
      color: var(--text-link);
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #back-to-dashboard:hover {
      text-decoration: underline;
    }

    #project-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      flex: 1;
    }

    #branch-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #branch-bar label {
      font-size: 12px;
      color: var(--text-muted);
    }

    #branch-select {
      background: var(--bg-page);
      border: 1px solid var(--border-default);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      max-width: 200px;
    }

    #branch-select:focus {
      outline: none;
      border-color: var(--text-link);
    }

    /* Detail body: 3-column grid (phase navigator | file list | content) */
    #detail-body {
      flex: 1;
      display: grid;
      grid-template-columns: 200px 180px minmax(0, 1fr);
      grid-template-rows: 1fr;
      overflow: hidden;
      transition: grid-template-columns 200ms ease;
    }

    #detail-body.nav-collapsed {
      grid-template-columns: 0px 180px minmax(0, 1fr);
    }

    #phase-navigator {
      overflow: hidden;
      width: 200px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-default);
      overflow-y: auto;
      padding: 8px 0;
      font-size: 13px;
    }

    .nav-col-toggle {
      width: 22px;
      height: 22px;
      border: 1px solid var(--border-default);
      border-radius: 4px;
      background: var(--bg-surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 4px 4px 4px;
    }

    .nav-col-toggle:hover {
      background: var(--hover-faint);
      color: var(--text-primary);
    }

    .phase-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: box-shadow 0.1s;
    }

    .phase-dot--complete { background: var(--status-complete); }
    .phase-dot--active   { background: var(--status-active); }
    .phase-dot--pending  { background: var(--text-dimmed); }

    .phase-node--selected .phase-dot {
      box-shadow: 0 0 0 3px var(--active-ring);
    }

    .phase-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }

    .phase-node--selected .phase-label {
      color: var(--text-primary);
    }

    .phase-progress {
      font-size: 10px;
      color: var(--text-dimmed);
      text-align: center;
      white-space: nowrap;
    }

    .phase-node--selected .phase-progress {
      color: var(--text-muted);
    }

    /* Completed phases collapse to dot-only */
    .phase-node--complete .phase-label,
    .phase-node--complete .phase-progress {
      display: none;
    }
    .phase-node--complete {
      padding: 4px 4px;
    }
    /* Selected completed phase reveals its label */
    .phase-node--selected.phase-node--complete .phase-label {
      display: inline;
    }

    /* In-progress phase always shows label and has active ring */
    .phase-node--in-progress .phase-label {
      color: var(--status-active);
      font-weight: 600;
    }
    .phase-node--in-progress .phase-dot {
      box-shadow: 0 0 0 3px var(--active-ring);
    }

    /* Sub-phase visual hierarchy */
    .phase-node--subphase {
      margin-left: 12px;
      transform: scale(0.9);
      opacity: 0.9;
    }
    .phase-node--subphase .phase-dot {
      width: 12px;
      height: 12px;
    }

    /* Sidebar file type indicators */
    .phase-file-item--complete::before {
      content: '\2713 ';
      color: var(--status-complete);
      font-weight: 600;
    }
    .phase-file-item--plan::before {
      content: '\25B6 ';
      color: var(--text-link);
    }
    .phase-file-item--research::before {
      content: '\25CE ';
      color: var(--text-muted);
    }
    .phase-file-item--verification::before {
      content: '\2713\2713 ';
      color: var(--status-complete);
      font-weight: 600;
    }
    .phase-file-item--context::before {
      content: '\25C7 ';
      color: var(--text-muted);
    }
    .phase-file-item--validation::before {
      content: '\25C9 ';
      color: var(--text-muted);
    }

    #phase-file-list {
      background: var(--bg-surface);
      border-right: 1px solid var(--border-default);
      overflow-y: auto;
      padding: 8px 0;
    }

    .phase-file-item {
      display: block;
      color: var(--text-link);
      text-decoration: none;
      padding: 5px 12px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .phase-file-item:hover {
      text-decoration: underline;
      background: var(--hover-faint);
    }

    .phase-file-item.active {
      background: var(--active-bg);
      border-left: 2px solid var(--text-link);
      color: var(--text-bright);
      padding-left: 10px;
    }

    .phase-file-empty {
      color: var(--text-dimmed);
      font-style: italic;
      font-size: 13px;
      padding: 12px;
    }

    #phase-content {
      background: var(--bg-page);
      overflow-y: auto;
      padding: 24px;
    }

    #phase-content .markdown-body {
      max-width: 860px;
    }

    .phase-content-loading {
      color: var(--text-muted);
      font-style: italic;
    }

    .phase-content-error {
      color: var(--status-danger);
    }

    /* Plan metadata bar — shown above PLAN.md content */
    .plan-meta-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      margin-bottom: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .plan-meta-bar .meta-label {
      color: var(--text-primary);
      font-weight: 600;
    }

    .plan-meta-bar .meta-sep {
      color: var(--text-dimmed);
    }

    /* Plan metadata card — structured replacement for plan-meta-bar */
    .plan-meta-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 16px;
      font-size: 12px;
    }
    .plan-meta-field-label {
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      align-self: start;
    }
    .plan-meta-field-value {
      color: var(--text-primary);
    }
    .req-chip {
      display: inline-block;
      background: var(--border-default);
      border: 1px solid var(--border-muted);
      border-radius: 12px;
      padding: 1px 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin: 2px 3px 2px 0;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .req-chip--dash {
      color: var(--text-link);
      border-color: var(--active-ring);
    }

    /* Browse view context bar — shows project info when navigating from dashboard */
    #browse-context-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      margin: 16px 24px 0;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      font-size: 13px;
      flex-shrink: 0;
    }

    #browse-context-bar .ctx-project {
      color: var(--text-bright);
      font-weight: 600;
    }

    #browse-context-bar .ctx-sep {
      color: var(--text-dimmed);
    }

    #browse-context-bar .ctx-phase {
      color: var(--text-muted);
    }

    #browse-context-bar .ctx-link {
      margin-left: auto;
      color: var(--text-link);
      text-decoration: none;
      font-size: 12px;
      flex-shrink: 0;
    }

    #browse-context-bar .ctx-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header id="app-header">
    <a id="app-title" href="#/">gsd-browser</a>
    <span id="header-sep">|</span>
    <nav id="header-nav">
      <a class="nav-link" href="#/" data-view="dashboard">Dashboard</a>
      <a class="nav-link" href="#/browse/" data-view="browse">Browse</a>
      <a class="nav-link header-link" href="/sources">Sources</a>
    </nav>
    <button id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
    <nav id="breadcrumb"></nav>
    <div id="header-spacer"></div>
  </header>

  <div id="views">

    <!-- Dashboard view -->
    <div id="view-dashboard" class="view active">
      <p class="dash-loading">Loading...</p>
    </div>

    <!-- Browse view -->
    <div id="view-browse" class="view">
      <aside id="browse-sidebar">
        <div id="source-switcher">
          <select id="source-select" aria-label="Select source"></select>
        </div>
        <div id="tree"></div>
      </aside>
      <div id="browse-content-wrapper">
        <div id="browse-context-bar" hidden></div>
        <main id="browse-content">
          <p class="content-loading">Loading...</p>
        </main>
      </div>
    </div>

    <!-- Project view -->
    <div id="view-project" class="view">
      <!-- Header: back link, project title, branch selector -->
      <div id="project-header">
        <a href="#/" id="back-to-dashboard">&larr; Dashboard</a>
        <h2 id="project-title"></h2>
        <div id="branch-bar" hidden>
          <label for="branch-select">Branch:</label>
          <select id="branch-select" aria-label="Select branch"></select>
        </div>
      </div>

      <!-- Detail body: 3-column grid (phase navigator | file list | content) -->
      <div id="detail-body">
        <div id="phase-navigator">
          <!-- Populated by JS in Plan 02 -->
        </div>
        <div id="phase-file-list">
          <button class="nav-col-toggle" id="nav-col-toggle" title="Toggle phase navigator">&#9664;</button>
          <!-- File list populated by JS -->
        </div>
        <div id="phase-content"></div>
      </div>
    </div>

  </div>

  <script>
    // ----------------------------------------------------------------
    // App state
    // ----------------------------------------------------------------
    let currentView = 'dashboard';
    let currentSource = null;
    let sourcesList = [];
    const lastViewedFile = new Map();
    let treeData = null;
    let cachedDashboardData = null;

    // ----------------------------------------------------------------
    // Utilities
    // ----------------------------------------------------------------

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    /** Fetch a URL, check status, parse JSON. Throws on non-ok response. */
    async function apiFetch(url) {
      const res = await fetch(url);
      if (!res.ok) throw Object.assign(new Error('HTTP ' + res.status), { status: res.status });
      return res.json();
    }

    /** Show a loading indicator inside an element (delayed by ms to avoid flash). */
    function showLoading(el, className, delayMs = 200) {
      return setTimeout(() => { el.innerHTML = '<p class="' + className + '">Loading...</p>'; }, delayMs);
    }

    /** Show an error message inside an element. */
    function showError(el, className, message) {
      el.innerHTML = '<p class="' + className + '">' + escapeHtml(message) + '</p>';
    }

    // ----------------------------------------------------------------
    // Hash-based routing
    // ----------------------------------------------------------------

    // Parse #/ into { view, sourceName, filePath, branch }
    function parseAppHash(hash) {
      if (!hash || hash === '#' || hash === '#/') {
        return { view: 'dashboard' };
      }
      const raw = hash.replace(/^#\/?/, '');
      const parts = raw.split('/');

      if (parts[0] === 'project') {
        return {
          view: 'project',
          sourceName: decodeURIComponent(parts[1] || ''),
          branch: parts[2] ? decodeURIComponent(parts[2]) : null
        };
      }
      if (parts[0] === 'browse') {
        const sourceName = decodeURIComponent(parts[1] || '');
        const filePath = parts.slice(2).map(decodeURIComponent).join('/');
        return { view: 'browse', sourceName, filePath };
      }
      return { view: 'dashboard' };
    }

    function buildBrowseHash(sourceName, filePath) {
      return '#/browse/' + encodeURIComponent(sourceName) + (filePath ? '/' + filePath : '');
    }

    function buildProjectHash(sourceName, branch) {
      return '#/project/' + encodeURIComponent(sourceName) + (branch ? '/' + encodeURIComponent(branch) : '');
    }

    // ----------------------------------------------------------------
    // View management
    // ----------------------------------------------------------------

    function showView(viewName) {
      // Hide all views
      const views = document.querySelectorAll('.view');
      views.forEach(v => v.classList.remove('active'));

      // Show target view
      const target = document.getElementById('view-' + viewName);
      if (target) target.classList.add('active');

      // Update nav highlights
      const navLinks = document.querySelectorAll('.nav-link[data-view]');
      navLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.view === viewName);
      });

      // Show/hide browse-specific header elements
      const sidebarToggle = document.getElementById('sidebar-toggle');
      const breadcrumb = document.getElementById('breadcrumb');
      if (viewName === 'browse') {
        sidebarToggle.classList.add('visible');
        breadcrumb.classList.add('visible');
      } else {
        sidebarToggle.classList.remove('visible');
        breadcrumb.classList.remove('visible');
      }

      currentView = viewName;
    }

    // ----------------------------------------------------------------
    // Router
    // ----------------------------------------------------------------

    async function route(hash) {
      const parsed = parseAppHash(hash);

      if (parsed.view === 'dashboard') {
        showView('dashboard');
        await loadDashboard();
      } else if (parsed.view === 'browse') {
        showView('browse');
        await enterBrowseView(parsed.sourceName, parsed.filePath);
      } else if (parsed.view === 'project') {
        showView('project');
        await loadProjectDetail(parsed.sourceName, parsed.branch);
      }
    }

    // ----------------------------------------------------------------
    // Dashboard view
    // ----------------------------------------------------------------

    async function loadDashboard() {
      const viewEl = document.getElementById('view-dashboard');
      const timer = showLoading(viewEl, 'dash-loading');

      try {
        const data = await apiFetch('/api/dashboard');
        clearTimeout(timer);
        cachedDashboardData = data;
        renderDashboard(viewEl, data.projects || [], data.other || []);
      } catch (err) {
        clearTimeout(timer);
        showError(viewEl, 'dash-error', 'Error loading dashboard: ' + err.message);
      }
    }

    function renderDashboard(container, projects, other) {
      container.innerHTML = '';
      const frag = document.createDocumentFragment();

      // GSD Projects section
      if (projects.length > 0) {
        const section = document.createElement('div');
        section.className = 'dash-section';

        const title = document.createElement('div');
        title.className = 'dash-section-title';
        title.textContent = 'Projects';
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'project-grid';

        for (const project of projects) {
          grid.appendChild(renderProjectCard(project));
        }

        section.appendChild(grid);
        frag.appendChild(section);
      } else {
        const section = document.createElement('div');
        section.className = 'dash-section';
        const empty = document.createElement('p');
        empty.className = 'dash-empty';
        empty.innerHTML = 'No GSD projects found. <a href="/sources" style="color:var(--text-link)">Add a source</a> to get started.';
        section.appendChild(empty);
        frag.appendChild(section);
      }

      // Other Sources section
      if (other.length > 0) {
        const section = document.createElement('div');
        section.className = 'dash-section dash-section-gap';

        const title = document.createElement('div');
        title.className = 'dash-section-title';
        title.textContent = 'Other Sources';
        section.appendChild(title);

        const list = document.createElement('div');
        list.className = 'other-sources-list';

        for (const src of other) {
          const item = document.createElement('div');
          item.className = 'other-source-item';

          const link = document.createElement('a');
          link.className = 'other-source-link';
          link.href = buildBrowseHash(src.name, '');
          link.textContent = escapeHtml(src.name);
          link.addEventListener('click', (e) => {
            e.preventDefault();
            history.pushState(null, '', buildBrowseHash(src.name, ''));
            route(window.location.hash);
          });

          const badge = document.createElement('span');
          badge.className = 'other-source-badge';
          badge.textContent = 'file browser';

          item.appendChild(link);
          item.appendChild(badge);
          list.appendChild(item);
        }

        section.appendChild(list);
        frag.appendChild(section);
      }

      // Bottom padding
      const pad = document.createElement('div');
      pad.className = 'dash-bottom-pad';
      frag.appendChild(pad);

      container.appendChild(frag);
    }

    function renderProjectCard(project) {
      const card = document.createElement('div');
      card.className = 'project-card';

      // Header: project name + milestone
      const header = document.createElement('div');
      header.className = 'project-card-header';
      const nameEl = document.createElement('div');
      nameEl.className = 'project-card-name';
      nameEl.textContent = project.name;
      header.appendChild(nameEl);
      if (project.milestone) {
        const ms = document.createElement('span');
        ms.className = 'project-card-milestone';
        ms.textContent = project.milestone;
        header.appendChild(ms);
      }
      card.appendChild(header);

      // Current phase callout
      const phases = project.phaseStatus || [];
      const activePhase = phases.find(p => p.status === 'in-progress');
      if (activePhase) {
        const callout = document.createElement('div');
        callout.className = 'card-current-phase';

        const title = document.createElement('div');
        title.className = 'card-phase-title';
        title.textContent = '\u25B6 Phase ' + (activePhase.displayNum || activePhase.numStr) + ': ' + activePhase.slug;
        callout.appendChild(title);

        const prog = document.createElement('div');
        prog.className = 'card-phase-progress';
        prog.textContent = activePhase.completedPlans + '/' + activePhase.planCount + ' plans';
        const pct = project.progress || {};
        if (pct.percent) prog.textContent += ' \u00B7 ' + pct.percent + '% complete';
        callout.appendChild(prog);

        if (project.lastActivity) {
          const act = document.createElement('div');
          act.className = 'card-phase-activity';
          act.textContent = project.lastActivity;
          callout.appendChild(act);
        }

        card.appendChild(callout);
      } else {
        // No active phase — show overall progress
        const pct = project.progress || {};
        if (pct.percent || project.currentFocus) {
          const focus = document.createElement('div');
          focus.className = 'card-phase-progress';
          focus.style.marginBottom = '8px';
          let text = project.currentFocus || '';
          if (pct.percent) text += (text ? ' \u00B7 ' : '') + pct.percent + '% complete';
          focus.textContent = text;
          card.appendChild(focus);
        }
      }

      // Merge phases with unstarted ROADMAP phases for pending indicators (DASH-09)
      const deps = project.dependencies || {};
      let allPhases = phases;
      if (Object.keys(deps).length > 0) {
        const roadmapPhaseNums = Object.keys(deps)
          .sort((a, b) => comparePhaseNums(a, b));
        const existingNums = new Set(phases.map(p => String(p.displayNum || p.numStr)));
        const unstartedPhases = roadmapPhaseNums
          .filter(num => !existingNums.has(String(num)))
          .map(num => ({ numStr: num, displayNum: num, status: 'pending', planCount: 0, completedPlans: 0, slug: '' }));
        allPhases = [...phases, ...unstartedPhases]
          .sort((a, b) => comparePhaseNums(a.numStr, b.numStr));
      }

      // History strip + frontier list
      if (allPhases.length > 0) {
        const phaseGoals = project.phaseGoals || {};
        const phaseNames = project.phaseNames || {};

        const { history, frontier } = splitHistoryFrontier(allPhases);

        // Phase strip: proportional colored rectangles for ALL phases (complete + active + pending)
        function rectStatusClass(status) {
          if (status === 'in-progress') return 'active';
          if (status === 'complete') return 'complete';
          return 'pending';
        }

        if (allPhases.length > 0) {
          const strip = document.createElement('div');
          strip.className = 'card-history-strip';

          const allTree = buildPhaseTree(allPhases);
          const rectScaler = createRectScaler(allPhases);

          // Recursive tree node: rect + optional children tier
          // depthScale shrinks 80% per level for visual hierarchy
          function renderTreeNode(phase, depth) {
            const depthScale = Math.pow(0.8, depth);
            const node = document.createElement('div');
            const hasChildren = phase.children && phase.children.length > 0;
            node.className = 'history-node' + (hasChildren ? ' history-node--parent' : '');

            const dims = rectScaler(phase.planCount, phase.requirementCount, depthScale);
            const rect = document.createElement('div');
            const statusCls = rectStatusClass(phase.status);
            rect.className = 'history-rect history-rect--' + statusCls;
            rect.style.width = dims.width + 'px';
            rect.style.height = dims.height + 'px';
            // Active glow scaling: large rects get glow, small get border
            if (statusCls === 'active') {
              rect.dataset.area = (dims.width * dims.height > 200) ? 'large' : 'small';
            }
            const disp = phase.displayNum || phase.numStr;
            const name = phaseNames[disp] || phase.slug || disp;
            rect.title = 'Phase ' + disp + ': ' + name + '\n' + (phase.planCount || 0) + ' plans, ' + (phase.requirementCount || 0) + ' requirements';
            node.appendChild(rect);

            // Children tier with org-chart connectors
            if (hasChildren) {
              const tier = document.createElement('div');
              tier.className = 'history-tier';
              for (const child of phase.children) {
                tier.appendChild(renderTreeNode(child, depth + 1));
              }
              node.appendChild(tier);
            }

            return node;
          }

          for (const root of allTree) {
            strip.appendChild(renderTreeNode(root, 0));
          }

          card.appendChild(strip);
        }

        // Frontier list: active/future phases with full slug names and goal excerpts
        if (frontier.length > 0) {
          const frontierEl = document.createElement('div');
          frontierEl.className = 'card-frontier';

          for (const phase of frontier) {
            const depth = getPhaseDepth(phase.numStr);
            const item = document.createElement('div');
            item.className = 'frontier-item' + (depth > 0 ? ' frontier-item--depth-' + depth : '');

            const dot = document.createElement('div');
            const dotStatus = phase.status === 'in-progress' ? 'active' : phase.status === 'complete' ? 'complete' : 'pending';
            dot.className = 'frontier-dot frontier-dot--' + dotStatus;
            item.appendChild(dot);

            const slugEl = document.createElement('span');
            slugEl.className = 'frontier-slug';
            const phaseDisp = phase.displayNum || phase.numStr;
            const phaseName = phaseNames[phaseDisp] || phase.slug || '';
            slugEl.textContent = phaseName ? phaseDisp + ' ' + phaseName : phaseDisp;
            item.appendChild(slugEl);

            const goalText = phaseGoals[phaseDisp] || '';
            if (goalText) {
              const goalEl = document.createElement('span');
              goalEl.className = 'frontier-goal';
              goalEl.textContent = goalText.length > 40 ? goalText.slice(0, 40) + '\u2026' : goalText;
              item.appendChild(goalEl);
            }

            if (phase.status === 'in-progress' && phase.planCount) {
              const prog = document.createElement('span');
              prog.className = 'frontier-progress';
              prog.textContent = (phase.completedPlans || 0) + '/' + phase.planCount + ' plans';
              item.appendChild(prog);
            }

            frontierEl.appendChild(item);
          }

          card.appendChild(frontierEl);
        }
      }

      // Quick-links (only those that exist) — use absolute paths for correct per-source rendering
      const existingLinks = (project.quickLinks || []).filter(ql => ql.exists);
      if (existingLinks.length > 0) {
        const qlRow = document.createElement('div');
        qlRow.className = 'quick-links';

        for (const ql of existingLinks) {
          const link = document.createElement('a');
          link.className = 'quick-link';
          // Use absolute path (source.path + relative) so /render resolves to correct source
          const absPath = (project.path ? project.path.replace(/\/+$/, '') + '/' : '') + ql.path;
          link.href = buildBrowseHash(project.name, absPath);
          link.textContent = ql.name;

          link.addEventListener('click', (e) => {
            e.stopPropagation(); // don't trigger card click
            e.preventDefault();
            const hashUrl = buildBrowseHash(project.name, absPath);
            history.pushState(null, '', hashUrl);
            route(window.location.hash);
          });

          qlRow.appendChild(link);
        }

        card.appendChild(qlRow);
      }

      // Card click → project view
      card.addEventListener('click', () => {
        const hashUrl = buildProjectHash(project.name, null);
        history.pushState(null, '', hashUrl);
        route(window.location.hash);
      });

      return card;
    }

    // ----------------------------------------------------------------
    // Browse view
    // ----------------------------------------------------------------

    async function updateBrowseContextBar(sourceName) {
      const bar = document.getElementById('browse-context-bar');
      bar.hidden = true;
      bar.innerHTML = '';

      // Lazy-fetch dashboard data if not cached
      if (!cachedDashboardData) {
        try {
          cachedDashboardData = await apiFetch('/api/dashboard');
        } catch { /* ignore */ }
      }
      if (!cachedDashboardData) return;
      const project = (cachedDashboardData.projects || []).find(p => p.name === sourceName);
      if (!project) return;

      const activePhase = (project.phaseStatus || []).find(p => p.status === 'in-progress');

      const nameSpan = document.createElement('span');
      nameSpan.className = 'ctx-project';
      nameSpan.textContent = project.name;
      bar.appendChild(nameSpan);

      if (activePhase) {
        const sep = document.createElement('span');
        sep.className = 'ctx-sep';
        sep.textContent = '|';
        bar.appendChild(sep);

        const phaseSpan = document.createElement('span');
        phaseSpan.className = 'ctx-phase';
        let phaseText = 'Phase ' + (activePhase.displayNum || activePhase.numStr) + ': ' + activePhase.slug;
        const pct = project.progress || {};
        if (pct.percent) phaseText += ' \u00B7 ' + pct.percent + '%';
        phaseSpan.textContent = phaseText;
        bar.appendChild(phaseSpan);
      }

      const link = document.createElement('a');
      link.className = 'ctx-link';
      link.href = buildProjectHash(project.name, null);
      link.textContent = '\u2190 project detail';
      link.addEventListener('click', (e) => {
        e.preventDefault();
        history.pushState(null, '', buildProjectHash(project.name, null));
        route(window.location.hash);
      });
      bar.appendChild(link);

      bar.hidden = false;
    }

    async function enterBrowseView(sourceName, filePath) {
      // Load sources if not loaded yet
      if (sourcesList.length === 0) {
        await loadSources();
      }

      if (sourcesList.length === 0) {
        document.getElementById('browse-content').innerHTML =
          '<p class="content-empty">No sources registered. <a href="/sources" style="color:var(--text-link)">Add a source</a> to get started.</p>';
        return;
      }

      // Determine which source to use
      let targetSource = sourceName;
      if (!targetSource || !sourcesList.some(s => s.name === targetSource)) {
        targetSource = sourcesList[0].name;
      }

      if (targetSource !== currentSource) {
        currentSource = targetSource;
        document.getElementById('source-select').value = targetSource;
        await loadTree(targetSource);
      }

      // Show project context bar if this source is a GSD project
      updateBrowseContextBar(targetSource);

      if (filePath) {
        // Normalize absolute filesystem paths to relative paths for tree matching.
        // Dashboard quick-links build absolute paths (/Users/.../project/.planning/STATE.md)
        // but tree sidebar nodes use relative data-path (.planning/STATE.md).
        const source = sourcesList.find(s => s.name === targetSource);
        if (source && source.path && filePath.startsWith(source.path)) {
          filePath = filePath.slice(source.path.length).replace(/^\/+/, '');
        }
        lastViewedFile.set(targetSource, filePath);
        await loadFile(targetSource, filePath);
      } else {
        // Try to load the last viewed file, or README, or first file
        let fileToLoad = lastViewedFile.get(targetSource) || null;
        if (!fileToLoad) {
          fileToLoad = findReadme(treeData) || findFirstFile(treeData);
        }
        if (fileToLoad) {
          history.replaceState(null, '', buildBrowseHash(targetSource, fileToLoad));
          await loadFile(targetSource, fileToLoad);
        } else {
          document.getElementById('browse-content').innerHTML =
            '<p class="content-empty">No markdown files found in this source.</p>';
          updateBreadcrumb(targetSource, '');
          history.replaceState(null, '', buildBrowseHash(targetSource, ''));
        }
      }
    }

    // ----------------------------------------------------------------
    // Breadcrumb
    // ----------------------------------------------------------------

    function updateBreadcrumb(sourceName, filePath) {
      const bc = document.getElementById('breadcrumb');
      bc.textContent = '';

      const sourceSpan = document.createElement('span');
      sourceSpan.className = 'bc-file';
      sourceSpan.textContent = sourceName || 'gsd-browser';
      bc.appendChild(sourceSpan);

      if (!filePath) return;

      const parts = filePath.split('/');
      for (let i = 0; i < parts.length; i++) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep';
        sep.textContent = '/';
        bc.appendChild(sep);

        const part = document.createElement('span');
        if (i === parts.length - 1) {
          part.className = 'bc-file';
        }
        part.textContent = parts[i];
        bc.appendChild(part);
      }
    }

    // ----------------------------------------------------------------
    // File loading (browse view)
    // ----------------------------------------------------------------

    async function loadFile(sourceName, filePath) {
      if (!filePath) return;

      const contentEl = document.getElementById('browse-content');
      const timer = showLoading(contentEl, 'content-loading');

      try {
        const url = '/render?path=' + encodeURIComponent(filePath) + '&fragment=true';
        const res = await fetch(url);
        clearTimeout(timer);

        if (!res.ok) {
          showError(contentEl, 'content-error', 'Failed to load file (HTTP ' + res.status + ')');
          return;
        }

        contentEl.innerHTML = await res.text();
        contentEl.scrollTop = 0;

        updateBreadcrumb(sourceName, filePath);
        lastViewedFile.set(sourceName, filePath);
        setActiveFile(filePath);
      } catch (err) {
        clearTimeout(timer);
        showError(contentEl, 'content-error', 'Error: ' + err.message);
      }
    }

    // ----------------------------------------------------------------
    // Active file highlighting (browse view)
    // ----------------------------------------------------------------

    function setActiveFile(filePath) {
      const prev = document.querySelectorAll('.tree-file.active');
      prev.forEach(el => el.classList.remove('active'));

      if (!filePath) return;

      const link = document.querySelector('.tree-file[data-path="' + CSS.escape(filePath) + '"]');
      if (!link) return;

      link.classList.add('active');

      let parent = link.parentElement;
      while (parent) {
        if (parent.classList && parent.classList.contains('tree-children')) {
          parent.hidden = false;
          const dirBtn = parent.previousElementSibling;
          if (dirBtn && dirBtn.classList.contains('tree-dir')) {
            dirBtn.classList.remove('collapsed');
          }
        }
        parent = parent.parentElement;
      }

      link.scrollIntoView({ block: 'nearest' });
    }

    // ----------------------------------------------------------------
    // Tree building (browse view)
    // ----------------------------------------------------------------

    function buildTreeNode(node, sourceName, depth) {
      const indent = depth * 16;

      if (node.type === 'file') {
        const a = document.createElement('a');
        a.className = 'tree-file';
        a.href = buildBrowseHash(sourceName, node.path);
        a.dataset.path = node.path;
        a.dataset.source = sourceName;
        a.style.paddingLeft = (indent + 8) + 'px';
        a.style.paddingRight = '8px';
        a.textContent = node.name;

        a.addEventListener('click', (e) => {
          e.preventDefault();
          lastViewedFile.set(sourceName, node.path);
          const hashUrl = buildBrowseHash(sourceName, node.path);
          history.pushState(null, '', hashUrl);
          loadFile(sourceName, node.path);
        });

        return a;
      }

      if (node.type === 'dir') {
        const wrapper = document.createElement('div');
        wrapper.className = 'tree-node';

        const isConvention = node.convention === true;
        const startCollapsed = !isConvention;

        const btn = document.createElement('button');
        btn.className = 'tree-dir' + (isConvention ? ' tree-dir--convention' : '');
        if (startCollapsed) btn.classList.add('collapsed');
        btn.style.paddingLeft = indent + 'px';
        btn.style.paddingRight = '8px';

        const arrow = document.createElement('span');
        arrow.className = 'tree-dir-arrow';
        arrow.textContent = '\u25BC';
        btn.appendChild(arrow);

        const label = document.createElement('span');
        label.textContent = node.name;
        btn.appendChild(label);

        const childContainer = document.createElement('div');
        childContainer.className = 'tree-children';
        childContainer.hidden = startCollapsed;

        btn.addEventListener('click', () => {
          const isCollapsed = btn.classList.toggle('collapsed');
          childContainer.hidden = isCollapsed;
        });

        for (const child of (node.children || [])) {
          const childEl = buildTreeNode(child, sourceName, depth + 1);
          if (childEl) childContainer.appendChild(childEl);
        }

        wrapper.appendChild(btn);
        wrapper.appendChild(childContainer);
        return wrapper;
      }

      return null;
    }

    // ----------------------------------------------------------------
    // Source loading (browse view)
    // ----------------------------------------------------------------

    async function loadSources() {
      try {
        const data = await apiFetch('/api/sources');
        sourcesList = (data.sources || []).filter(s => s.available);

        const select = document.getElementById('source-select');
        select.textContent = '';

        if (sourcesList.length === 0) {
          const opt = document.createElement('option');
          opt.textContent = 'No sources registered';
          opt.disabled = true;
          select.appendChild(opt);
          return;
        }

        for (const src of sourcesList) {
          const opt = document.createElement('option');
          opt.value = src.name;
          opt.textContent = src.name + '  (' + src.path + ')';
          select.appendChild(opt);
        }

        if (currentSource) {
          select.value = currentSource;
        }
      } catch (err) {
        showError(document.getElementById('browse-content'), 'content-error', 'Failed to load sources: ' + err.message);
      }
    }

    async function loadTree(sourceName) {
      const treeEl = document.getElementById('tree');
      treeEl.textContent = '';

      try {
        const data = await apiFetch('/api/sources/' + encodeURIComponent(sourceName) + '/tree');
        treeData = data.tree;

        if (!treeData || treeData.length === 0) {
          const msg = document.createElement('p');
          msg.className = 'tree-empty';
          msg.textContent = 'No markdown files found.';
          treeEl.appendChild(msg);
          return;
        }

        const frag = document.createDocumentFragment();
        for (const node of treeData) {
          const el = buildTreeNode(node, sourceName, 0);
          if (el) frag.appendChild(el);
        }
        treeEl.appendChild(frag);
      } catch (err) {
        const msg = document.createElement('p');
        msg.className = 'tree-empty';
        msg.textContent = 'Failed to load file tree.';
        treeEl.appendChild(msg);
      }
    }

    function findFirstFile(nodes) {
      const queue = [...(nodes || [])];
      while (queue.length) {
        const node = queue.shift();
        if (node.type === 'file') return node.path;
        if (node.children) queue.push(...node.children);
      }
      return null;
    }

    function findReadme(nodes) {
      for (const node of (nodes || [])) {
        if (node.type === 'file' && node.name.toLowerCase() === 'readme.md') {
          return node.path;
        }
      }
      return null;
    }

    async function switchSource(sourceName) {
      currentSource = sourceName;
      document.getElementById('source-select').value = sourceName;
      treeData = null;

      await loadTree(sourceName);

      let fileToLoad = lastViewedFile.get(sourceName) || null;
      if (!fileToLoad) {
        fileToLoad = findReadme(treeData) || findFirstFile(treeData);
      }

      if (fileToLoad) {
        history.replaceState(null, '', buildBrowseHash(sourceName, fileToLoad));
        await loadFile(sourceName, fileToLoad);
      } else {
        document.getElementById('browse-content').innerHTML =
          '<p class="content-empty">No markdown files found in this source.</p>';
        updateBreadcrumb(sourceName, '');
        history.replaceState(null, '', buildBrowseHash(sourceName, ''));
      }
    }

    // ----------------------------------------------------------------
    // Sidebar toggle (browse view)
    // ----------------------------------------------------------------

    function toggleSidebar() {
      document.getElementById('view-browse').classList.toggle('sidebar-hidden');
    }

    // ----------------------------------------------------------------
    // Project detail view
    // ----------------------------------------------------------------

    // Track current project state for branch switching
    let currentProjectName = null;
    let currentProjectPhase = null;

    async function loadProjectDetail(sourceName, branch) {
      if (!sourceName) {
        document.getElementById('project-title').textContent = 'Unknown project';
        return;
      }

      currentProjectName = sourceName;

      // Show loading state
      document.getElementById('project-title').textContent = escapeHtml(sourceName);
      document.getElementById('phase-navigator').innerHTML = '';
      document.getElementById('phase-file-list').innerHTML = '<button class="nav-col-toggle" id="nav-col-toggle" title="Toggle phase navigator">&#9664;</button>';
      document.getElementById('phase-content').innerHTML = '<p class="phase-content-loading">Loading...</p>';
      document.getElementById('branch-bar').hidden = true;

      try {
        let url = '/api/projects/' + encodeURIComponent(sourceName) + '/detail';
        if (branch) url += '?branch=' + encodeURIComponent(branch);

        const data = await apiFetch(url);

        // Set title
        document.getElementById('project-title').textContent = data.source ? data.source.name : sourceName;

        // Branch selector
        const branches = data.branches || [];
        const branchBar = document.getElementById('branch-bar');
        const branchSelect = document.getElementById('branch-select');
        if (branches.length > 1) {
          branchSelect.textContent = '';
          for (const b of branches) {
            const opt = document.createElement('option');
            opt.value = b;
            opt.textContent = b;
            branchSelect.appendChild(opt);
          }
          branchSelect.value = data.branch || branches[0];
          branchBar.hidden = false;
        } else {
          branchBar.hidden = true;
        }

        // Render timeline — merge in pending phases from roadmap
        const phases = data.phases || [];
        const deps = data.dependencies || {};
        const pNames = data.phaseNames || {};
        const existingNums = new Set(phases.map(p => String(p.displayNum || p.numStr)));
        const pendingPhases = Object.keys(deps)
          .filter(num => !existingNums.has(String(num)))
          .map(num => ({ numStr: num, displayNum: num, status: 'pending', slug: pNames[num] || '', files: [], planDetails: [] }));
        const allTimelinePhases = [...phases, ...pendingPhases]
          .sort((a, b) => comparePhaseNums(a.numStr, b.numStr));
        // Store sourcePath on #detail-body for use by selectPhase click handlers
        const detailBody = document.getElementById('detail-body');
        if (detailBody) detailBody.dataset.sourcePath = data.source ? data.source.path : '';
        renderTimeline(allTimelinePhases);

        // Auto-select phase: first in-progress, then last complete, then first
        let autoPhase = phases.find(p => p.status === 'in-progress');
        if (!autoPhase) {
          const completePhases = phases.filter(p => p.status === 'complete');
          autoPhase = completePhases[completePhases.length - 1];
        }
        if (!autoPhase && phases.length > 0) {
          autoPhase = phases[0];
        }

        if (autoPhase) {
          selectPhase(autoPhase, data.source ? data.source.path : null);
        } else {
          document.getElementById('phase-file-list').innerHTML = '<button class="nav-col-toggle" id="nav-col-toggle" title="Toggle phase navigator">&#9664;</button>';
          document.getElementById('phase-content').innerHTML =
            '<p class="phase-content-loading">No phases found.</p>';
        }
      } catch (err) {
        document.getElementById('phase-navigator').innerHTML =
          '<span class="phase-content-error">Error loading project: ' + escapeHtml(err.message) + '</span>';
        document.getElementById('phase-content').innerHTML = '';
      }
    }

    function classifyPhaseFile(fileName) {
      if (fileName.endsWith('-SUMMARY.md')) return 'complete';
      if (fileName.endsWith('-PLAN.md')) return 'plan';
      if (fileName.endsWith('-RESEARCH.md')) return 'research';
      if (fileName.endsWith('-VERIFICATION.md')) return 'verification';
      if (fileName.endsWith('-CONTEXT.md')) return 'context';
      if (fileName.endsWith('-VALIDATION.md')) return 'validation';
      return 'other';
    }

    function getPhaseDepth(numStr) {
      return String(numStr).split('.').length - 1; // "4"->0, "4.5"->1, "4.5.1"->2
    }

    function getImmediateParent(numStr) {
      const parts = String(numStr).split('.');
      if (parts.length <= 1) return null;
      return parts.slice(0, -1).join('.');
    }

    function comparePhaseNums(a, b) {
      const partsA = String(a).split('.').map(Number);
      const partsB = String(b).split('.').map(Number);
      const len = Math.max(partsA.length, partsB.length);
      for (let i = 0; i < len; i++) {
        const diff = (partsA[i] || 0) - (partsB[i] || 0);
        if (diff !== 0) return diff;
      }
      return 0;
    }

    function buildPhaseTree(phases) {
      const byKey = {};
      const roots = [];
      for (const phase of phases) {
        byKey[String(phase.numStr)] = { ...phase, children: [] };
      }
      for (const phase of phases) {
        const parentNum = getImmediateParent(phase.numStr);
        if (parentNum && byKey[parentNum]) {
          byKey[parentNum].children.push(byKey[String(phase.numStr)]);
        } else {
          roots.push(byKey[String(phase.numStr)]);
        }
      }
      return roots;
    }

    function splitHistoryFrontier(phases) {
      // phases: flat sorted array
      let boundaryIdx = phases.length;
      for (let i = 0; i < phases.length; i++) {
        if (phases[i].status !== 'complete') {
          boundaryIdx = i;
          break;
        }
      }
      return { history: phases.slice(0, boundaryIdx), frontier: phases.slice(boundaryIdx) };
    }

    // Project-relative scaling: computes dimensions relative to the project's
    // own data range so area contrast is dramatic (3:1+ ratio target).
    // Call createScaler(allPhases) once per card, then scaler(phase, depthScale).
    function createRectScaler(phases) {
      const plans = phases.map(p => p.planCount || 0);
      const reqs = phases.map(p => p.requirementCount || 0);
      const maxPlans = Math.max(1, ...plans);
      const maxReqs = Math.max(1, ...reqs);

      const MIN = 8;     // minimum dimension px
      const MAX_W = 28;  // maximum width px (prevent one phase squashing others)
      const MAX_H = 22;  // maximum height px

      return function scaler(planCount, reqCount, depthScale) {
        // Normalize to 0..1 range within this project, then apply sqrt
        // to stretch low values (ensures 3:1+ area ratio)
        const normP = Math.sqrt((planCount || 0) / maxPlans);
        const normR = Math.sqrt((reqCount || 0) / maxReqs);
        const w = Math.max(MIN, Math.round(MIN + normP * (MAX_W - MIN))) * depthScale;
        const h = Math.max(MIN, Math.round(MIN + normR * (MAX_H - MIN))) * depthScale;
        return { width: Math.round(w), height: Math.round(h) };
      };
    }

    function groupPhases(phases) {
      // Legacy adapter: converts buildPhaseTree output format to old {parent, children} array format
      // Used by renderTimeline() for the detail page — detail page layout not being redesigned
      const roots = buildPhaseTree(phases);
      return roots.map(root => ({
        parent: { ...root, children: undefined },
        children: root.children || []
      }));
    }

    function makePhaseNode(phase, extraClasses) {
      const node = document.createElement('div');
      let cls = 'phase-node';
      if (phase.status === 'complete') cls += ' phase-node--complete';
      if (phase.status === 'in-progress') cls += ' phase-node--in-progress';
      if (extraClasses) cls += ' ' + extraClasses;
      node.className = cls;
      node.dataset.phaseNum = phase.numStr;

      // Dot
      const dotClass = phase.status === 'complete'
        ? 'phase-dot--complete'
        : phase.status === 'in-progress'
          ? 'phase-dot--active'
          : 'phase-dot--pending';
      const dot = document.createElement('div');
      dot.className = 'phase-dot ' + dotClass;
      node.appendChild(dot);

      // Label: phase number + slug name (never truncate)
      const label = document.createElement('span');
      label.className = 'phase-label';
      const labelDisp = phase.displayNum || phase.numStr;
      label.textContent = labelDisp + ': ' + (phase.slug || 'Phase ' + labelDisp);
      label.title = 'Phase ' + labelDisp + (phase.slug ? ' — ' + phase.slug : '');
      node.appendChild(label);

      // Progress: "X/Y plans"
      const progress = document.createElement('span');
      progress.className = 'phase-progress';
      progress.textContent = (phase.completedPlans || 0) + '/' + (phase.planCount || 0) + ' plans';
      node.appendChild(progress);

      return node;
    }

    function renderTimeline(phases) {
      const container = document.getElementById('phase-timeline');
      if (!container) return; // #phase-timeline replaced by #phase-navigator in Plan 02
      container.innerHTML = '';

      if (!phases || phases.length === 0) {
        container.innerHTML = '<span class="phase-timeline-empty">No phases found.</span>';
        return;
      }

      const groups = groupPhases(phases);

      for (let i = 0; i < groups.length; i++) {
        const group = groups[i];

        if (group.children.length > 0) {
          // Wrap parent + children in a subphase group
          const wrapper = document.createElement('div');
          wrapper.className = 'phase-subphase-group';

          const parentNode = makePhaseNode(group.parent, null);
          parentNode.addEventListener('click', () => {
            const sourcePath = container.dataset.sourcePath || null;
            selectPhase(group.parent, sourcePath);
          });
          wrapper.appendChild(parentNode);

          for (const child of group.children) {
            const childNode = makePhaseNode(child, 'phase-node--subphase');
            childNode.addEventListener('click', () => {
              const sourcePath = container.dataset.sourcePath || null;
              selectPhase(child, sourcePath);
            });
            wrapper.appendChild(childNode);
          }

          container.appendChild(wrapper);
        } else {
          // Single node (no children)
          const node = makePhaseNode(group.parent, null);
          node.addEventListener('click', () => {
            const sourcePath = container.dataset.sourcePath || null;
            selectPhase(group.parent, sourcePath);
          });
          container.appendChild(node);
        }

        // Connector between groups (not after last)
        if (i < groups.length - 1) {
          const conn = document.createElement('div');
          conn.className = 'phase-connector';
          container.appendChild(conn);
        }
      }
    }

    function selectPhase(phaseObj, sourcePath) {
      if (!phaseObj) return;
      currentProjectPhase = phaseObj;

      // Store sourcePath on #detail-body (preferred) or legacy #phase-timeline container
      const detailBody = document.getElementById('detail-body');
      const container = document.getElementById('phase-timeline');
      const resolvedSourcePath = sourcePath
        || (detailBody && detailBody.dataset.sourcePath)
        || (container && container.dataset.sourcePath)
        || '';
      if (detailBody) detailBody.dataset.sourcePath = resolvedSourcePath;
      if (container) {
        container.dataset.sourcePath = resolvedSourcePath;
        // Update selected highlight on nodes (legacy horizontal timeline, no-op if #phase-timeline absent)
        const allNodes = container.querySelectorAll('.phase-node');
        allNodes.forEach(n => {
          n.classList.toggle('phase-node--selected', n.dataset.phaseNum === String(phaseObj.numStr));
        });
      }

      // Build file list (only .md files)
      const fileListEl = document.getElementById('phase-file-list');
      fileListEl.innerHTML = '<button class="nav-col-toggle" id="nav-col-toggle" title="Toggle phase navigator">&#9664;</button>';

      const mdFiles = (phaseObj.files || []).filter(f => f.endsWith('.md'));
      if (mdFiles.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'phase-file-empty';
        empty.textContent = 'No documentation files.';
        fileListEl.appendChild(empty);
        document.getElementById('phase-content').innerHTML = '';
        return;
      }

      // Phase directory name is "numStr-slug" e.g. "04.5-gsd-dashboard"
      const phaseDir = phaseObj.numStr + (phaseObj.slug ? '-' + phaseObj.slug : '');

      for (const fileName of mdFiles) {
        const item = document.createElement('button');
        const fileType = classifyPhaseFile(fileName);
        item.className = 'phase-file-item phase-file-item--' + fileType;
        item.textContent = fileName;
        item.title = fileName;
        item.dataset.fileName = fileName;

        item.addEventListener('click', () => {
          // Highlight active
          fileListEl.querySelectorAll('.phase-file-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          loadPhaseFile(currentProjectName, phaseDir, fileName, resolvedSourcePath, phaseObj.planDetails);
        });

        fileListEl.appendChild(item);
      }

      // Auto-select first file
      const firstItem = fileListEl.querySelector('.phase-file-item');
      if (firstItem) {
        firstItem.classList.add('active');
        loadPhaseFile(currentProjectName, phaseDir, mdFiles[0], resolvedSourcePath, phaseObj.planDetails);
      }
    }

    async function loadPhaseFile(sourceName, phaseDir, fileName, sourcePath, planDetails) {
      const contentEl = document.getElementById('phase-content');
      contentEl.innerHTML = '<p class="phase-content-loading">Loading...</p>';

      try {
        // Build absolute file path: sourcePath + /.planning/phases/phaseDir/fileName
        const base = (sourcePath || '').replace(/\/+$/, '');
        const filePath = base + '/.planning/phases/' + phaseDir + '/' + fileName;

        const url = '/render?path=' + encodeURIComponent(filePath) + '&fragment=true';
        const res = await fetch(url);

        if (!res.ok) {
          showError(contentEl, 'phase-content-error', 'Failed to load file (HTTP ' + res.status + ')');
          return;
        }

        const html = await res.text();

        contentEl.innerHTML = html;

        // Build structured plan metadata card for PLAN.md files
        if (planDetails && planDetails.length > 0) {
          const detail = planDetails.find(d => d.file === fileName);
          if (detail && detail.wave != null) {
            const metaCard = document.createElement('div');
            metaCard.className = 'plan-meta-card';

            function createMetaRow(labelText, valueContent) {
              const label = document.createElement('div');
              label.className = 'plan-meta-field-label';
              label.textContent = labelText;
              const value = document.createElement('div');
              value.className = 'plan-meta-field-value';
              if (typeof valueContent === 'string') {
                value.textContent = valueContent;
              } else {
                value.appendChild(valueContent);
              }
              return [label, value];
            }

            // Wave row
            const [waveLabel, waveValue] = createMetaRow('Wave', String(detail.wave));
            metaCard.appendChild(waveLabel);
            metaCard.appendChild(waveValue);

            // Depends On row
            const depsText = detail.dependsOn && detail.dependsOn.length > 0
              ? detail.dependsOn.join(', ')
              : '(none)';
            const [depsLabel, depsValue] = createMetaRow('Depends On', depsText);
            metaCard.appendChild(depsLabel);
            metaCard.appendChild(depsValue);

            // Requirements row
            const reqs = detail.requirements || [];
            const reqLabel = document.createElement('div');
            reqLabel.className = 'plan-meta-field-label';
            reqLabel.textContent = 'Requirements';
            const reqValue = document.createElement('div');
            reqValue.className = 'plan-meta-field-value';
            if (reqs.length === 0) {
              reqValue.textContent = '(none)';
            } else {
              reqs.forEach(function(id) {
                const chip = document.createElement('span');
                chip.className = 'req-chip';
                if (id.startsWith('DASH-')) chip.className += ' req-chip--dash';
                chip.textContent = id;
                reqValue.appendChild(chip);
              });
            }
            metaCard.appendChild(reqLabel);
            metaCard.appendChild(reqValue);

            contentEl.insertBefore(metaCard, contentEl.firstChild);
          }
        }

        contentEl.scrollTop = 0;
      } catch (err) {
        showError(contentEl, 'phase-content-error', 'Error: ' + err.message);
      }
    }

    // ----------------------------------------------------------------
    // Boot sequence
    // ----------------------------------------------------------------

    document.addEventListener('DOMContentLoaded', async () => {
      // Wire sidebar toggle
      document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

      // Wire back-to-dashboard link
      document.getElementById('back-to-dashboard').addEventListener('click', (e) => {
        e.preventDefault();
        history.pushState(null, '', '#/');
        route(window.location.hash);
      });

      // Wire branch selector
      document.getElementById('branch-select').addEventListener('change', (e) => {
        const branch = e.target.value;
        if (currentProjectName) {
          const hashUrl = buildProjectHash(currentProjectName, branch);
          history.pushState(null, '', hashUrl);
          loadProjectDetail(currentProjectName, branch);
        }
      });

      // Wire source switcher
      document.getElementById('source-select').addEventListener('change', (e) => {
        switchSource(e.target.value);
      });

      // Wire nav links to use hash routing
      document.querySelectorAll('.nav-link[data-view]').forEach(link => {
        if (link.getAttribute('href').startsWith('#')) {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const href = link.getAttribute('href');
            history.pushState(null, '', href);
            route(window.location.hash);
          });
        }
      });

      // Initial route
      await route(window.location.hash);

      // Handle browser back/forward
      window.addEventListener('popstate', () => {
        route(window.location.hash);
      });
    });
  </script>
