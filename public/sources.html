<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gsd-browser - Sources</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-default);
      padding-bottom: 12px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 12px;
    }

    section {
      margin-bottom: 32px;
    }

    /* Add source form */
    .add-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    input[type="text"] {
      background: var(--bg-surface);
      border: 1px solid var(--border-muted);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      min-width: 260px;
    }

    input[type="text"]:focus {
      border-color: var(--text-link);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    input[type="text"]::placeholder {
      color: var(--text-dimmed);
    }

    button {
      background: var(--bg-overlay);
      border: 1px solid var(--border-muted);
      border-radius: 6px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--border-muted);
      border-color: var(--text-muted);
    }

    button.primary {
      background: var(--btn-primary-bg);
      border-color: var(--btn-primary-hover-bg);
      color: var(--btn-primary-text);
    }

    button.primary:hover {
      background: var(--btn-primary-hover-bg);
    }

    button.danger {
      background: transparent;
      border-color: var(--status-danger);
      color: var(--status-danger);
      font-size: 12px;
      padding: 4px 10px;
    }

    button.danger:hover {
      background: var(--status-danger-bg);
    }

    button.edit {
      background: transparent;
      border-color: var(--text-link);
      color: var(--text-link);
      font-size: 12px;
      padding: 4px 10px;
      margin-right: 6px;
    }

    button.edit:hover {
      background: var(--hover-subtle);
    }

    /* Edit modal */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.7);
      bottom: 0;
      display: none;
      left: 0;
      position: fixed;
      right: 0;
      top: 0;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-muted);
      border-radius: 12px;
      padding: 24px;
      min-width: 400px;
    }

    .modal h2 {
      margin-bottom: 16px;
    }

    .modal .field {
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* Sources table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-default);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 8px 12px;
      text-align: left;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid var(--border-default);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--bg-surface);
    }

    td {
      padding: 10px 12px;
      vertical-align: middle;
    }

    .source-name {
      color: var(--text-bright);
      font-weight: 500;
    }

    .source-path {
      color: var(--text-muted);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
    }

    .badge {
      border-radius: 12px;
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
    }

    .badge-available {
      background: var(--status-complete-bg);
      border: 1px solid var(--status-complete-border);
      color: var(--status-complete);
    }

    .badge-unavailable {
      background: var(--status-danger-bg);
      border: 1px solid var(--status-danger-border);
      color: var(--status-danger);
    }

    .conventions-list {
      color: var(--text-link);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 11px;
    }

    .empty-state {
      color: var(--text-dimmed);
      font-style: italic;
      padding: 24px 0;
      text-align: center;
    }

    /* Status messages */
    .status {
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      padding: 10px 14px;
    }

    .status-success {
      background: var(--status-complete-bg);
      border: 1px solid var(--status-complete-border);
      color: var(--status-complete);
    }

    .status-error {
      background: var(--status-danger-bg);
      border: 1px solid var(--status-danger-border);
      color: var(--status-danger);
    }

    .status-hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>gsd-browser - Sources</h1>

  <section>
    <h2>Add Source</h2>
    <div class="add-form">
      <div class="field">
        <label for="path-input">Path</label>
        <input type="text" id="path-input" placeholder="/path/to/directory">
      </div>
      <div class="field">
        <label for="name-input">Name (optional)</label>
        <input type="text" id="name-input" placeholder="auto-detected">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="primary" id="add-btn">Add Source</button>
      </div>
    </div>
    <div id="status-msg" class="status status-hidden"></div>
  </section>

  <section>
    <h2>Registered Sources</h2>
    <div id="sources-container">
      <p class="empty-state">Loading...</p>
    </div>
  </section>

  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>Edit Source</h2>
      <input type="hidden" id="edit-original-name">
      <div class="field">
        <label for="edit-name">Name</label>
        <input type="text" id="edit-name">
      </div>
      <div class="field">
        <label for="edit-path">Path</label>
        <input type="text" id="edit-path">
      </div>
      <div class="modal-actions">
        <button id="cancel-edit">Cancel</button>
        <button class="primary" id="save-edit">Save</button>
      </div>
    </div>
  </div>

  <script>
    const pathInput = document.getElementById('path-input');
    const nameInput = document.getElementById('name-input');
    const addBtn = document.getElementById('add-btn');
    const statusMsg = document.getElementById('status-msg');
    const sourcesContainer = document.getElementById('sources-container');

    function showStatus(message, isError) {
      statusMsg.textContent = message;
      statusMsg.className = 'status ' + (isError ? 'status-error' : 'status-success');
      clearTimeout(showStatus._timer);
      showStatus._timer = setTimeout(() => {
        statusMsg.className = 'status status-hidden';
      }, 5000);
    }

    async function loadSources() {
      try {
        const res = await fetch('/api/sources');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderSources(data.sources || []);
      } catch (err) {
        sourcesContainer.innerHTML = '<p class="empty-state">Failed to load sources: ' + err.message + '</p>';
      }
    }

    function renderSources(sources) {
      if (sources.length === 0) {
        sourcesContainer.innerHTML = '<p class="empty-state">No sources registered. Add a directory above to get started.</p>';
        return;
      }

      const rows = sources.map(src => {
        const statusBadge = src.available
          ? '<span class="badge badge-available">available</span>'
          : '<span class="badge badge-unavailable">unavailable</span>';

        const conventions = src.conventions && src.conventions.length > 0
          ? '<span class="conventions-list">' + src.conventions.join(', ') + '</span>'
          : '<span style="color:var(--text-dimmed)">—</span>';

        const safeName = escapeHtml(src.name);
        const safePath = escapeHtml(src.path);

        return `<tr>
          <td><span class="source-name">${safeName}</span></td>
          <td><span class="source-path">${safePath}</span></td>
          <td>${statusBadge}</td>
          <td>${conventions}</td>
          <td>
            <button class="edit" data-name="${safeName}" data-path="${safePath}">Edit</button>
            <button class="danger" data-name="${safeName}">Remove</button>
          </td>
        </tr>`;
      }).join('');

      sourcesContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Path</th>
              <th>Status</th>
              <th>Conventions</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      sourcesContainer.querySelectorAll('button.danger').forEach(btn => {
        btn.addEventListener('click', () => removeSource(btn.dataset.name));
      });

      sourcesContainer.querySelectorAll('button.edit').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.name, btn.dataset.path));
      });
    }

    const editModal = document.getElementById('edit-modal');
    const editNameInput = document.getElementById('edit-name');
    const editPathInput = document.getElementById('edit-path');
    const editOriginalName = document.getElementById('edit-original-name');
    const cancelEditBtn = document.getElementById('cancel-edit');
    const saveEditBtn = document.getElementById('save-edit');

    function openEditModal(name, path) {
      editOriginalName.value = name;
      editNameInput.value = name;
      editPathInput.value = path;
      editModal.classList.add('active');
      editNameInput.focus();
    }

    function closeEditModal() {
      editModal.classList.remove('active');
    }

    cancelEditBtn.addEventListener('click', closeEditModal);
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEditModal();
    });

    saveEditBtn.addEventListener('click', async () => {
      const originalName = editOriginalName.value;
      const newName = editNameInput.value.trim();
      const newPath = editPathInput.value.trim();

      if (!newName && !newPath) {
        showStatus('Provide name or path to update.', true);
        return;
      }

      saveEditBtn.disabled = true;
      saveEditBtn.textContent = 'Saving...';

      try {
        const body = {};
        if (newName) body.name = newName;
        if (newPath) body.path = newPath;

        const res = await fetch('/api/sources/' + encodeURIComponent(originalName), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.ok) {
          showStatus('Updated: ' + data.source.name, false);
          closeEditModal();
          await loadSources();
        } else {
          showStatus(data.error || 'Failed to update (HTTP ' + res.status + ')', true);
        }
      } catch (err) {
        showStatus('Network error: ' + err.message, true);
      } finally {
        saveEditBtn.disabled = false;
        saveEditBtn.textContent = 'Save';
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && editModal.classList.contains('active')) {
        closeEditModal();
      }
    });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function addSource() {
      const targetPath = pathInput.value.trim();
      if (!targetPath) {
        showStatus('Please enter a path.', true);
        return;
      }

      addBtn.disabled = true;
      addBtn.textContent = 'Adding...';

      try {
        const body = { path: targetPath };
        const name = nameInput.value.trim();
        if (name) body.name = name;

        const res = await fetch('/api/sources', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.status === 201) {
          showStatus('Added: ' + (data.source ? data.source.name : targetPath), false);
          pathInput.value = '';
          nameInput.value = '';
          await loadSources();
        } else {
          showStatus(data.error || 'Failed to add source (HTTP ' + res.status + ')', true);
        }
      } catch (err) {
        showStatus('Network error: ' + err.message, true);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = 'Add Source';
      }
    }

    async function removeSource(name) {
      try {
        const res = await fetch('/api/sources/' + encodeURIComponent(name), {
          method: 'DELETE'
        });
        const data = await res.json();

        if (res.ok) {
          showStatus('Removed: ' + name, false);
          await loadSources();
        } else {
          showStatus(data.error || 'Failed to remove source (HTTP ' + res.status + ')', true);
        }
      } catch (err) {
        showStatus('Network error: ' + err.message, true);
      }
    }

    addBtn.addEventListener('click', addSource);

    pathInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addSource();
    });

    loadSources();
  </script>
</body>
</html>
